server {
    listen 80;
    server_name 82.180.144.91; # Replace with your domain if available

    # Security Headers
    add_header Content-Security-Policy "default-src 'self' http: https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: http: https: images.unsplash.com *.unsplash.com; font-src 'self' data: http: https: fonts.gstatic.com; connect-src 'self' http: https: wss:;" always;

    # Static Uploads (Backend) - Persistent outside deploy path
    location /uploads/ {
        alias /var/www/sarvashresthaCMS_UAT/uploads/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Frontend (SvelteKit)
    location / {
        proxy_pass http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (.NET)
    location /api/ {
        proxy_pass http://localhost:5200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
