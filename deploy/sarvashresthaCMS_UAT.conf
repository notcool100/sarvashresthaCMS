server {
    listen 80;
    server_name 82.180.144.91; # Alternatively, place your UAT domain here if you have one

    # Override the global strict HTTPS-only CSP for this UAT instance
    add_header Content-Security-Policy "default-src 'self' http: https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: http: https:; font-src 'self' data: http: https:; connect-src 'self' http: https: wss:;" always;



    # Root location -> Frontend
    location / {
        proxy_pass http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # /api location -> Backend (Assuming .NET API is prefixed with /api, otherwise use your specific route)
    location /api/ {
        proxy_pass http://localhost:5200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # If the backend expects "/api" prefix stripped, you can use:
        # proxy_pass http://localhost:5200/;
    }
}
